<script>

let moedas = 0;
let valorClique = 1;
let auto = 0;
let criticoChance = 0.1;

let custoClique = 10;
let custoAuto = 50;
let custoCritico = 100;

let xp = 0;
let nivel = 1;
let xpMax = 100;

/* ===== JOGO ===== */
function clicar() {
  let ganho = valorClique;

  if (Math.random() < criticoChance) {
    ganho *= 2;
  }

  moedas += ganho;
  xp += ganho;

  verificarNivel();
  atualizar();
}

function upgradeClique() {
  if (moedas >= custoClique) {
    moedas -= custoClique;
    valorClique++;
    custoClique = Math.floor(custoClique * 1.5);
    atualizar();
  }
}

function upgradeAuto() {
  if (moedas >= custoAuto) {
    moedas -= custoAuto;
    auto++;
    custoAuto = Math.floor(custoAuto * 1.7);
    atualizar();
  }
}

function upgradeCritico() {
  if (moedas >= custoCritico) {
    moedas -= custoCritico;
    criticoChance += 0.05;
    custoCritico = Math.floor(custoCritico * 2);
    atualizar();
  }
}

function verificarNivel() {
  if (xp >= xpMax) {
    xp -= xpMax;
    nivel++;
    xpMax = Math.floor(xpMax * 1.5);
    valorClique++;
    moedas += 50;
  }
}

function atualizar() {
  document.getElementById("moedas").innerText = "Moedas: " + moedas;
  document.getElementById("valor").innerText = "Clique: +" + valorClique;
  document.getElementById("critico").innerText = "Crítico: " + Math.floor(criticoChance * 100) + "%";

  document.getElementById("custoClique").innerText = "Custo: " + custoClique;
  document.getElementById("custoAuto").innerText = "Custo: " + custoAuto;
  document.getElementById("custoCritico").innerText = "Custo: " + custoCritico;

  document.getElementById("xp").innerText = "XP: " + xp + " / " + xpMax;
  document.getElementById("nivel").innerText = "Nível: " + nivel;
}

/* ===== AUTO CLICK ===== */
setInterval(() => {
  moedas += auto;
  xp += auto;
  verificarNivel();
  atualizar();
}, 1000);

/* ===== SAVE ===== */
setInterval(() => {
  localStorage.setItem("save", JSON.stringify({
    moedas, valorClique, auto, criticoChance,
    custoClique, custoAuto, custoCritico,
    xp, nivel, xpMax
  }));
}, 2000);

/* ===== LOAD ===== */
window.onload = () => {

  let save = JSON.parse(localStorage.getItem("save"));

  if (save) {
    moedas = save.moedas;
    valorClique = save.valorClique;
    auto = save.auto;
    criticoChance = save.criticoChance;
    custoClique = save.custoClique;
    custoAuto = save.custoAuto;
    custoCritico = save.custoCritico;
    xp = save.xp;
    nivel = save.nivel;
    xpMax = save.xpMax;
  }

  atualizar();

  /* ===== ANIMAÇÃO DVD (AGORA GARANTIDA) ===== */

  let imgs = [
    { el: document.getElementById("img1"), x: 100, y: 100, dx: 2, dy: 2 },
    { el: document.getElementById("img2"), x: 300, y: 200, dx: -2, dy: 2 },
    { el: document.getElementById("img3"), x: 500, y: 150, dx: 2, dy: -2 }
  ];

  function animar() {
    let w = window.innerWidth;
    let h = window.innerHeight;

    imgs.forEach(i => {
      i.x += i.dx;
      i.y += i.dy;

      if (i.x <= 0 || i.x >= w - 160) i.dx *= -1;
      if (i.y <= 0 || i.y >= h - 160) i.dy *= -1;

      i.el.style.left = i.x + "px";
      i.el.style.top = i.y + "px";
    });

    requestAnimationFrame(animar);
  }

  animar();
};

</script>
