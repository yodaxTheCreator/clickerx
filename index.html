<!DOCTYPE html>
<html>
<head>
<title>Clicker Game</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
  overflow: hidden;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}

.box {
  border: 2px solid white;
  padding: 10px;
  margin: 10px;
  display: inline-block;
  width: 250px;
}

/* imagens */
.bg {
  position: fixed;
  width: 160px;
  opacity: 0.5;
  z-index: -1;
  pointer-events: none;
}
</style>

</head>
<body>

<!-- IMAGENS -->
<img src="img1.jpeg" class="bg" id="img1">
<img src="img2.jpeg" class="bg" id="img2">
<img src="img3.jpeg" class="bg" id="img3">

<h1>🔥 Clicker Game</h1>

<div class="box">
  <h2 id="moedas">Moedas: 0 💰</h2>
  <h3 id="nivel">Nível: 1</h3>
  <h3 id="xp">XP: 0 / 100</h3>
</div>

<div class="box">
  <button onclick="clicar()">CLICAR</button>
</div>

<script>

let moedas = 0;
let nivel = 1;
let xp = 0;
let xpMax = 100;

function clicar() {
  moedas++;
  xp++;

  if (xp >= xpMax) {
    xp = 0;
    nivel++;
  }

  atualizar();
}

function atualizar() {
  document.getElementById("moedas").innerText = "Moedas: " + moedas;
  document.getElementById("nivel").innerText = "Nível: " + nivel;
  document.getElementById("xp").innerText = "XP: " + xp + " / " + xpMax;
}

atualizar();

/* ===== ANIMAÇÃO (CORRIGIDA) ===== */
window.onload = function () {

  let imgs = [
    { el: document.getElementById("img1"), x: 100, y: 100, dx: 2, dy: 2 },
    { el: document.getElementById("img2"), x: 300, y: 200, dx: -2, dy: 2 },
    { el: document.getElementById("img3"), x: 500, y: 150, dx: 2, dy: -2 }
  ];

  function animar() {
    let w = window.innerWidth;
    let h = window.innerHeight;

    imgs.forEach(i => {
      i.x += i.dx;
      i.y += i.dy;

      if (i.x <= 0 || i.x >= w - 160) i.dx *= -1;
      if (i.y <= 0 || i.y >= h - 160) i.dy *= -1;

      i.el.style.left = i.x + "px";
      i.el.style.top = i.y + "px";
    });

    requestAnimationFrame(animar);
  }

  animar();
};

</script>

</body>
</html>
