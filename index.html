<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clicker PRO MAX OFFLINE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
overflow:hidden;
text-align:center;
transition:0.3s;
}

/* HUD */
.panel{
display:inline-block;
background:#1f1f1f;
padding:14px;
margin:10px;
border-radius:14px;
width:340px;
}

/* BUTTONS */
button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.click{background:#ff9800;}
.shop{background:#4caf50;color:white;}
.up{background:#2196f3;color:white;}

/* PARTICLES */
.particle{
position:fixed;
color:gold;
font-weight:bold;
animation:float 1s forwards;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120px);opacity:0}
}

/* CURSOR */
.cursor-default{cursor:default;}
.cursor-hand{cursor:pointer;}
.cursor-cross{cursor:crosshair;}

/* CATS */
.cat{
position:fixed;
width:80px;
height:80px;
background:#777;
border-radius:20px;
opacity:0.35;
z-index:0;
}
</style>
</head>

<body class="cursor-default">

<!-- CATS -->
<div id="cat1" class="cat"></div>
<div id="cat2" class="cat"></div>
<div id="cat3" class="cat"></div>

<h1>🎮 CLICKER PRO MAX OFFLINE</h1>

<div class="panel">
<h2 id="coins">Coins: 0</h2>
<h3 id="stats"></h3>
<h3 id="prestige">Prestige: 0</h3>
</div>

<div class="panel">
<button class="click" onclick="clickGame(event)">CLICK</button>
</div>

<div class="panel">
<h3>UPGRADES</h3>
<button class="up" onclick="buy('click')">Click +1 (10)</button>
<button class="up" onclick="buy('auto')">Auto (50)</button>
<button class="up" onclick="buy('crit')">Crit (100)</button>
</div>

<div class="panel">
<h3>SHOP</h3>
<button class="shop" onclick="buySkin('gold')">Gold (100)</button>
<button class="shop" onclick="buySkin('neon')">Neon (250)</button>
<button class="shop" onclick="equip('gold')">Equip Gold</button>
<button class="shop" onclick="equip('neon')">Equip Neon</button>
</div>

<div class="panel">
<h3>CURSOR</h3>
<button class="shop" onclick="cursor('default')">Default</button>
<button class="shop" onclick="cursor('hand')">Hand</button>
<button class="shop" onclick="cursor('cross')">Cross</button>
</div>

<script>

/* ===== STATE ===== */
let state={
coins:0,
click:1,
auto:0,
crit:0.1,
prestige:0,
skin:"default"
};

/* ===== CLICK ===== */
window.clickGame=function(e){

let gain=state.click;
if(Math.random()<state.crit) gain*=2;

state.coins+=gain;

particle(e.clientX,e.clientY,"+"+gain);

update();
}

/* ===== BUY ===== */
window.buy=function(type){
if(type==="click" && state.coins>=10){state.coins-=10;state.click++;}
if(type==="auto" && state.coins>=50){state.coins-=50;state.auto++;}
if(type==="crit" && state.coins>=100){state.coins-=100;state.crit+=0.05;}
update();
}

/* ===== SKINS ===== */
window.buySkin=function(type){
if(type==="gold" && state.coins>=100){state.coins-=100;state.skin="gold";}
if(type==="neon" && state.coins>=250){state.coins-=250;state.skin="neon";}
update();
}

window.equip=function(type){
state.skin=type;

document.body.style.background =
type==="gold"
? "linear-gradient(45deg,#b8860b,#111)"
: type==="neon"
? "linear-gradient(45deg,#00ffff,#111)"
: "#0b0b0b";
}

/* ===== CURSOR ===== */
window.cursor=function(type){
document.body.className="cursor-"+type;
}

/* ===== PARTICLES ===== */
function particle(x,y,t){
let p=document.createElement("div");
p.className="particle";
p.innerText=t;
p.style.left=x+"px";
p.style.top=y+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),800);
}

/* ===== UPDATE ===== */
function update(){
document.getElementById("coins").innerText="Coins: "+state.coins;
document.getElementById("stats").innerText=
`Click:${state.click} | Auto:${state.auto} | Crit:${Math.floor(state.crit*100)}%`;
document.getElementById("prestige").innerText="Prestige: "+state.prestige;
}

/* ===== AUTO ===== */
setInterval(()=>{
state.coins+=state.auto;
update();
},1000);

/* ===== CATS REAL MOVEMENT ===== */
let cats=[
{x:50,y:50,vx:2,vy:2,id:"cat1"},
{x:200,y:150,vx:-2,vy:2,id:"cat2"},
{x:300,y:80,vx:2,vy:-2,id:"cat3"}
];

function moveCats(){
cats.forEach(c=>{
c.x+=c.vx;
c.y+=c.vy;

if(c.x<=0||c.x>=window.innerWidth-80) c.vx*=-1;
if(c.y<=0||c.y>=window.innerHeight-80) c.vy*=-1;

let el=document.getElementById(c.id);
el.style.left=c.x+"px";
el.style.top=c.y+"px";
});
}
setInterval(moveCats,16);

update();

</script>

</body>
</html>
