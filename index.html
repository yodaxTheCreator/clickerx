<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Clicker Stable</title>

<meta name="theme-color" content="#111">

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

/* BOTÕES */
button {
  padding: 10px 14px;
  margin: 5px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.1s;
}

button:active {
  transform: scale(0.95);
}

/* CAIXAS */
.box {
  display: inline-block;
  border: 1px solid #444;
  padding: 10px;
  margin: 10px;
  width: 260px;
  background: #1a1a1a;
  border-radius: 8px;
}

/* FUNDO */
.bg {
  position: fixed;
  width: 140px;
  opacity: 0.35;
  z-index: -1;
  pointer-events: none;
}

/* PARTÍCULAS */
.particle {
  position: fixed;
  color: gold;
  font-size: 16px;
  pointer-events: none;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-80px); opacity: 0; }
}

/* SKINS */
.gold { background: gold; color: black; }
.neon { background: #00ffd0; color: black; box-shadow: 0 0 10px #00ffd0; }
</style>
</head>

<body>

<img src="img1.jpeg" class="bg" id="bg1">
<img src="img2.jpeg" class="bg" id="bg2">
<img src="img3.jpeg" class="bg" id="bg3">

<h1>⚡ Stable Clicker</h1>

<div class="box">
  <h2 id="coins">Moedas: 0</h2>
  <h3 id="level">Nível: 1</h3>
  <h3 id="xp">XP: 0 / 100</h3>
</div>

<div class="box">
  <h3 id="click">Clique: +1</h3>
  <h3 id="crit">Crítico: 10%</h3>
  <button onclick="clickGame(event)">CLICAR</button>
</div>

<div class="box">
  <h3>Upgrades</h3>
  <button onclick="upClick()">+ Clique</button>
  <button onclick="upAuto()">Auto</button>
  <button onclick="upCrit()">Crítico</button>
</div>

<div class="box">
  <h3>🏪 Loja</h3>
  <button onclick="buySkin('default')">Normal</button>
  <button onclick="buySkin('gold')">Gold - 100</button>
  <button onclick="buySkin('neon')">Neon - 250</button>
  <p id="skinText">Skin: Normal</p>
</div>

<script>

/* ===== VARIÁVEIS SEGURAS ===== */
let coins = 0;
let click = 1;
let auto = 0;
let crit = 0.1;

let level = 1;
let xp = 0;
let xpMax = 100;

let skin = "default";

/* ===== CLICK ===== */
function clickGame(e) {
  let gain = click;

  if (Math.random() < crit) gain *= 2;

  coins += gain;
  xp += gain;

  particle(e.clientX, e.clientY, "+" + gain);

  levelUp();
  update();
}

/* ===== PARTÍCULAS ===== */
function particle(x, y, text) {
  let p = document.createElement("div");
  p.className = "particle";
  p.innerText = text;
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 1000);
}

/* ===== UPGRADES ===== */
function upClick(){ if(coins>=10){coins-=10;click++;update();} }
function upAuto(){ if(coins>=50){coins-=50;auto++;update();} }
function upCrit(){ if(coins>=100){coins-=100;crit+=0.05;update();} }

/* ===== LEVEL ===== */
function levelUp(){
  if(xp >= xpMax){
    xp -= xpMax;
    level++;
    xpMax = Math.floor(xpMax * 1.4);
    click++;
    coins += 25;
  }
}

/* ===== LOJA ===== */
function buySkin(type){
  if(type==="gold" && coins>=100){
    coins-=100;
    skin="gold";
  }
  if(type==="neon" && coins>=250){
    coins-=250;
    skin="neon";
  }
  if(type==="default"){
    skin="default";
  }

  applySkin();
  update();
}

function applySkin(){
  document.querySelectorAll("button").forEach(b=>{
    b.classList.remove("gold","neon");
    if(skin==="gold") b.classList.add("gold");
    if(skin==="neon") b.classList.add("neon");
  });

  document.getElementById("skinText").innerText = "Skin: " + skin;
}

/* ===== UPDATE ===== */
function update(){
  document.getElementById("coins").innerText = "Moedas: " + coins;
  document.getElementById("click").innerText = "Clique: +" + click;
  document.getElementById("crit").innerText = "Crítico: " + Math.floor(crit*100) + "%";
  document.getElementById("level").innerText = "Nível: " + level;
  document.getElementById("xp").innerText = "XP: " + xp + " / " + xpMax;
}

/* ===== AUTO CLICK (SEGURO SEM BUG) ===== */
setInterval(() => {
  coins += auto;
  xp += auto;
  levelUp();
  update();
}, 1000);

/* ===== SAVE ===== */
setInterval(() => {
  localStorage.setItem("save", JSON.stringify({
    coins, click, auto, crit, level, xp, xpMax, skin
  }));
}, 2000);

/* ===== LOAD (100% SAFE) ===== */
window.onload = () => {

  let s = JSON.parse(localStorage.getItem("save"));

  if (s) {
    coins = s.coins ?? 0;
    click = s.click ?? 1;
    auto = s.auto ?? 0;
    crit = s.crit ?? 0.1;
    level = s.level ?? 1;
    xp = s.xp ?? 0;
    xpMax = s.xpMax ?? 100;
    skin = s.skin ?? "default";
  }

  update();
  applySkin();

  /* ===== FUNDO ANIMADO ===== */
  let imgs = [
    { el: bg1, x: 100, y: 100, dx: 2, dy: 2 },
    { el: bg2, x: 300, y: 200, dx: -2, dy: 2 },
    { el: bg3, x: 500, y: 150, dx: 2, dy: -2 }
  ];

  function anim(){
    let w = innerWidth;
    let h = innerHeight;

    imgs.forEach(i=>{
      i.x += i.dx;
      i.y += i.dy;

      if(i.x<=0 || i.x>=w-140) i.dx *= -1;
      if(i.y<=0 || i.y>=h-140) i.dy *= -1;

      i.el.style.left = i.x + "px";
      i.el.style.top = i.y + "px";
    });

    requestAnimationFrame(anim);
  }

  anim();
};

</script>

</body>
</html>
