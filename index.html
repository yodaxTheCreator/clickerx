<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Clicker Pro MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
overflow:hidden;
text-align:center;
}

/* HUD */
.panel{
display:inline-block;
background:#1e1e1e;
padding:14px;
margin:10px;
border-radius:14px;
width:320px;
box-shadow:0 0 15px #000;
}

/* BOTÕES */
button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.15s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.click{background:#ff9800;}
.up{background:#2196f3;color:white;}
.shop{background:#4caf50;color:white;}

/* PARTICLES */
.particle{
position:fixed;
color:gold;
font-weight:bold;
animation:float 1s forwards;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100px);opacity:0}
}

/* CURSOR */
body.hand{cursor:pointer;}
body.cross{cursor:crosshair;}

/* RANKING */
.rankItem{
text-align:left;
padding:4px;
}
</style>
</head>

<body>

<h1>🎮 ULTIMATE CLICKER PRO MAX</h1>

<div class="panel">
<h2 id="coins">Coins: 0</h2>
<h3 id="level">Level: 1</h3>
<h3 id="xp">XP: 0 / 100</h3>
</div>

<div class="panel">
<button class="click" onclick="clickGame(event)">CLICK</button>
<p id="crit">Crit: 10%</p>
</div>

<div class="panel">
<h3>UPGRADES</h3>
<button class="up" onclick="buyClick()">Click +1 (10)</button>
<button class="up" onclick="buyAuto()">Auto (50)</button>
<button class="up" onclick="buyCrit()">Crit (100)</button>
</div>

<div class="panel">
<h3>🏪 SHOP</h3>
<button class="shop" onclick="buySkin('default')">Default</button>
<button class="shop" onclick="buySkin('gold')">Gold (100)</button>
<button class="shop" onclick="buySkin('neon')">Neon (250)</button>

<h3>🖱 Cursor</h3>
<button class="shop" onclick="setCursor('default')">Normal</button>
<button class="shop" onclick="setCursor('hand')">Hand</button>
<button class="shop" onclick="setCursor('cross')">Cross</button>
</div>

<div class="panel">
<h3>🏆 ACHIEVEMENTS</h3>
<p id="a1">❌ 100 coins</p>
<p id="a2">❌ 1000 coins</p>
<p id="a3">❌ Level 10</p>
</div>

<div class="panel">
<h3>🌐 GLOBAL RANKING</h3>
<div id="rank">Loading...</div>
</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8pMfTwb38FzbT1Fyi-3HVw9SvBHPr_pc",
  authDomain: "clickerx-fea00.firebaseapp.com",
  projectId: "clickerx-fea00",
  storageBucket: "clickerx-fea00.firebasestorage.app",
  messagingSenderId: "1058324120487",
  appId: "1:1058324120487:web:fabdeca94b66eede6f2c82"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= PLAYER ================= */
let playerName = localStorage.getItem("name");
if(!playerName){
playerName = prompt("Seu nome:");
if(!playerName) playerName="Player";
localStorage.setItem("name",playerName);
}

/* ================= VARS ================= */
let coins=0;
let click=1;
let auto=0;
let crit=0.1;
let level=1;
let xp=0;
let xpMax=100;

/* ================= SOUND ================= */
let clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
let levelSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");

/* ================= CLICK ================= */
window.clickGame=function(e){

let gain=click;
if(Math.random()<crit) gain*=2;

coins+=gain;
xp+=gain;

clickSound.play();
particle(e.clientX,e.clientY,"+"+gain);

levelUp();
update();
}

/* ================= PARTICLE ================= */
function particle(x,y,t){
let p=document.createElement("div");
p.className="particle";
p.innerText=t;
p.style.left=x+"px";
p.style.top=y+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);
}

/* ================= UPGRADES ================= */
window.buyClick=function(){
if(coins>=10){coins-=10;click++;update();}
}

window.buyAuto=function(){
if(coins>=50){coins-=50;auto++;update();}
}

window.buyCrit=function(){
if(coins>=100){coins-=100;crit+=0.05;update();}
}

/* ================= LEVEL ================= */
function levelUp(){
if(xp>=xpMax){
xp-=xpMax;
level++;
xpMax*=1.4;
click++;
coins+=25;
levelSound.play();
}
}

/* ================= CURSOR ================= */
window.setCursor=function(t){
document.body.classList.remove("hand","cross");
if(t==="hand") document.body.classList.add("hand");
if(t==="cross") document.body.classList.add("cross");
}

/* ================= ACHIEVEMENTS ================= */
let a1=false,a2=false,a3=false;

function achievements(){
if(coins>=100&&!a1){a1=true;document.getElementById("a1").innerText="✔ 100 coins";}
if(coins>=1000&&!a2){a2=true;document.getElementById("a2").innerText="✔ 1000 coins";}
if(level>=10&&!a3){a3=true;document.getElementById("a3").innerText="✔ Level 10";}
}

/* ================= UPDATE ================= */
function update(){
document.getElementById("coins").innerText="Coins: "+coins;
document.getElementById("level").innerText="Level: "+level;
document.getElementById("xp").innerText="XP: "+xp+" / "+xpMax;
document.getElementById("crit").innerText="Crit: "+Math.floor(crit*100)+"%";
achievements();
}

/* ================= AUTO ================= */
setInterval(()=>{
coins+=auto;
xp+=auto;
levelUp();
update();
},1000);

/* ================= SAVE ONLINE ================= */
async function save(){
await set(ref(db,"players/"+playerName),{
name:playerName,
coins:coins,
level:level
});
}

setInterval(save,2000);

/* ================= RANKING ================= */
async function loadRank(){

const snap = await get(child(ref(db),"players"));
if(!snap.exists()) return;

let data = snap.val();
let list = Object.values(data);

list.sort((a,b)=>b.coins-a.coins);
list = list.slice(0,10);

let html="";
list.forEach((p,i)=>{
html+=`<div class="rankItem">${i+1}. ${p.name} - ${p.coins}</div>`;
});

document.getElementById("rank").innerHTML=html;
}

setInterval(loadRank,3000);

window.onload=update;

</script>

</body>
</html>
