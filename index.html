<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Clicker PRO MAX V3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
overflow:hidden;
text-align:center;
}

/* ===== DVD CATS SYSTEM ===== */
.cat{
position:fixed;
width:110px;
opacity:0.22;
animation:bounce 6s linear infinite;
pointer-events:none;
}

@keyframes bounce{
0%{transform:translate(0,0)}
25%{transform:translate(250px,120px)}
50%{transform:translate(0,240px)}
75%{transform:translate(-250px,120px)}
100%{transform:translate(0,0)}
}

/* ===== UI ===== */
.panel{
display:inline-block;
background:#1d1d1d;
padding:15px;
margin:10px;
border-radius:15px;
width:340px;
box-shadow:0 0 20px black;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.15s;
}

button:hover{transform:scale(1.05);}
button:active{transform:scale(0.95);}

.click{background:#ff9800;}
.up{background:#2196f3;color:white;}
.shop{background:#4caf50;color:white;}
.red{background:#e53935;color:white;}

/* ===== PARTICLES ===== */
.particle{
position:fixed;
color:gold;
font-weight:bold;
animation:float 1s forwards;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-140px);opacity:0}
}

/* ===== HUD TEXT ===== */
.small{
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<!-- ===== BACKGROUND CATS ===== -->
<img class="cat" style="top:10%;left:5%" src="https://i.imgur.com/4AiXzf8.jpeg">
<img class="cat" style="top:60%;left:70%" src="https://i.imgur.com/4AiXzf8.jpeg">
<img class="cat" style="top:30%;left:35%" src="https://i.imgur.com/4AiXzf8.jpeg">

<h1>🎮 ULTIMATE CLICKER PRO MAX V3</h1>

<div class="panel">
<h2 id="coins">Coins: 0</h2>
<h3 id="level">Level: 1</h3>
<h3 id="xp">XP: 0 / 100</h3>
<h3 id="stats"></h3>
<h3 id="prestige">Prestige: 0</h3>
</div>

<div class="panel">
<button class="click" onclick="clickGame(event)">CLICK</button>
<p class="small">Clique para ganhar coins</p>
</div>

<div class="panel">
<h3>UPGRADES</h3>
<button class="up" onclick="buyClick()">Click +1 (10)</button>
<button class="up" onclick="buyAuto()">Auto Click (50)</button>
<button class="up" onclick="buyCrit()">Crit +5% (100)</button>
</div>

<div class="panel">
<h3>🏪 SHOP</h3>
<button class="shop" onclick="buySkin('gold')">Skin Gold (100)</button>
<button class="shop" onclick="buySkin('neon')">Skin Neon (250)</button>
<button class="shop" onclick="equipSkin('gold')">Equip Gold</button>
<button class="shop" onclick="equipSkin('neon')">Equip Neon</button>
</div>

<div class="panel">
<h3>🔥 PRESTIGE</h3>
<button class="red" onclick="prestige()">RESET + BONUS</button>
<p class="small">Multiplicador permanente</p>
</div>

<div class="panel">
<h3>🏆 RANKING GLOBAL</h3>
<div id="rank">Loading...</div>
</div>

<div class="panel">
<h3>🎯 ACHIEVEMENTS</h3>
<p id="a1">❌ 100 coins</p>
<p id="a2">❌ 1000 coins</p>
<p id="a3">❌ 10000 coins</p>
<p id="a4">❌ Prestige 1</p>
</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8pMfTwb38FzbT1Fyi-3HVw9SvBHPr_pc",
  authDomain: "clickerx-fea00.firebaseapp.com",
  projectId: "clickerx-fea00",
  storageBucket: "clickerx-fea00.firebasestorage.app",
  messagingSenderId: "1058324120487",
  appId: "1:1058324120487:web:fabdeca94b66eede6f2c82"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== PLAYER ===== */
let name = localStorage.getItem("name");
if(!name){
name = prompt("Seu nome:");
if(!name) name="Player";
localStorage.setItem("name",name);
}

/* ===== CORE ===== */
let coins=0;
let click=1;
let auto=0;
let crit=0.1;
let level=1;
let xp=0;
let xpMax=100;
let prestige=0;
let multiplier=1;
let skin="default";

/* ===== SOUNDS ===== */
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const levelSound = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");

/* ===== CLICK ===== */
window.clickGame=function(e){

let gain = click * multiplier;
if(Math.random()<crit) gain*=2;

coins+=gain;
xp+=gain;

clickSound.currentTime=0;
clickSound.play().catch(()=>{});

particle(e.clientX,e.clientY,"+"+gain);

levelUp();
checkAchievements();
update();
}

/* ===== PARTICLE ===== */
function particle(x,y,t){
let p=document.createElement("div");
p.className="particle";
p.innerText=t;
p.style.left=x+"px";
p.style.top=y+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);
}

/* ===== UPGRADES ===== */
window.buyClick=function(){
if(coins>=10){coins-=10;click++;}
update();
}

window.buyAuto=function(){
if(coins>=50){coins-=50;auto++;}
update();
}

window.buyCrit=function(){
if(coins>=100){coins-=100;crit+=0.05;}
update();
}

/* ===== LEVEL ===== */
function levelUp(){
if(xp>=xpMax){
xp-=xpMax;
level++;
xpMax*=1.4;
click++;
coins+=30;
levelSound.play();
}
}

/* ===== PRESTIGE ===== */
window.prestige=function(){
if(level>=10){
prestige++;
coins=0;
click=1;
auto=0;
crit=0.1;
level=1;
xp=0;
xpMax=100;
multiplier=1 + prestige*0.5;
}
}

/* ===== ACHIEVEMENTS ===== */
function checkAchievements(){
if(coins>=100) document.getElementById("a1").innerText="✔ 100 coins";
if(coins>=1000) document.getElementById("a2").innerText="✔ 1000 coins";
if(coins>=10000) document.getElementById("a3").innerText="✔ 10000 coins";
if(prestige>=1) document.getElementById("a4").innerText="✔ Prestige 1";
}

/* ===== UI ===== */
function update(){
document.getElementById("coins").innerText="Coins: "+coins;
document.getElementById("level").innerText="Level: "+level;
document.getElementById("xp").innerText="XP: "+xp+" / "+xpMax;
document.getElementById("stats").innerText=
`Click:${click} | Auto:${auto} | Crit:${Math.floor(crit*100)}% | x${multiplier}`;
document.getElementById("prestige").innerText="Prestige: "+prestige;
}

/* ===== AUTO ===== */
setInterval(()=>{
coins+=auto;
xp+=auto;
levelUp();
update();
},1000);

/* ===== FIREBASE SAVE ===== */
async function save(){
await set(ref(db,"players/"+name),{
name,
coins,
level,
prestige
});
}
setInterval(save,2000);

/* ===== RANKING ===== */
async function loadRank(){
const snap = await get(child(ref(db),"players"));
if(!snap.exists()) return;

let data = snap.val();
let list = Object.values(data);

list.sort((a,b)=>b.coins-a.coins);
list = list.slice(0,10);

let html="";
list.forEach((p,i)=>{
let medal = i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
html+=`${medal} ${i+1}. ${p.name} - ${p.coins}<br>`;
});

document.getElementById("rank").innerHTML=html;
}
setInterval(loadRank,3000);

window.onload=update;

</script>

</body>
</html>
